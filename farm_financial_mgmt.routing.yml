farm_financial_mgmt.dashboard:
  path: '/financial'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialDashboardController::view'
    _title: 'Financial'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.profit_loss:
  path: '/financial/reports/profit-loss'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::profitAndLoss'
    _title: 'Profit & Loss'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.spending:
  path: '/financial/reports/spending'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::spendingByCategory'
    _title: 'Spending by Category'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.income:
  path: '/financial/reports/income'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::incomeByCategory'
    _title: 'Income by Category'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.cash_flow:
  path: '/financial/reports/cash-flow'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::cashFlow'
    _title: 'Cash Flow'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.monthly:
  path: '/financial/reports/monthly'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::monthlyView'
    _title: 'Monthly view'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.per_record:
  path: '/financial/reports/per-record'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::perRecord'
    _title: 'Per-Record P&L'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.tax_summary:
  path: '/financial/reports/tax-summary'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::taxSummary'
    _title: 'Tax Summary'
  requirements:
    _custom_access: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::taxAccess'

farm_financial_mgmt.report.enterprise_pl:
  path: '/financial/reports/enterprise-pl'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::enterpriseProfitLoss'
    _title: 'Enterprise P&L'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.balance_sheet:
  path: '/financial/reports/balance-sheet'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::balanceSheet'
    _title: 'Balance Sheet'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.depreciation:
  path: '/financial/reports/depreciation'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::depreciationSchedule'
    _title: 'Depreciation Schedule'
  requirements:
    _custom_access: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::taxAccess'

farm_financial_mgmt.report.form_4797:
  path: '/financial/reports/form-4797'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::form4797'
    _title: 'Form 4797 (Dispositions)'
  requirements:
    _custom_access: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::taxAccess'

farm_financial_mgmt.import_export:
  path: '/financial/import-export'
  defaults:
    _form: '\Drupal\farm_financial_mgmt\Form\ImportExportForm'
    _title: 'Import / Export'
  requirements:
    _permission: 'manage financial transactions'

farm_financial_mgmt.export.cpa_csv:
  path: '/financial/export/cpa-csv'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialExportController::cpaCsv'
    _title: 'Export CPA CSV'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.export.quickbooks_csv:
  path: '/financial/export/quickbooks-csv'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialExportController::quickbooksCsv'
    _title: 'Export QuickBooks CSV'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.export.liabilities_csv:
  path: '/financial/export/liabilities-csv'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialExportController::liabilitiesCsv'
    _title: 'Export Liabilities CSV'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.export.depreciable_assets_csv:
  path: '/financial/export/depreciable-assets-csv'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialExportController::depreciableAssetsCsv'
    _title: 'Export Depreciable Assets CSV'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.depreciation_limits:
  path: '/financial/settings/depreciation-limits'
  defaults:
    _form: '\Drupal\farm_financial_mgmt\Form\DepreciationLimitsForm'
    _title: 'Depreciation Limits (§179 / Bonus)'
  requirements:
    _permission: 'administer financial mgmt'

farm_financial_mgmt.settings:
  path: '/financial/settings'
  defaults:
    _form: 'Drupal\farm_financial_mgmt\Form\SettingsForm'
    _title: 'Financial settings'
  requirements:
    _permission: 'administer financial mgmt'
