farm_financial_mgmt.dashboard:
  path: '/financial'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialDashboardController::view'
    _title: 'Financial'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.profit_loss:
  path: '/financial/reports/profit-loss'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::profitAndLoss'
    _title: 'Profit & Loss'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.spending:
  path: '/financial/reports/spending'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::spendingByCategory'
    _title: 'Spending by Category'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.income:
  path: '/financial/reports/income'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::incomeByCategory'
    _title: 'Income by Category'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.cash_flow:
  path: '/financial/reports/cash-flow'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::cashFlow'
    _title: 'Cash Flow'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.monthly:
  path: '/financial/reports/monthly'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::monthlyView'
    _title: 'Monthly view'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.per_record:
  path: '/financial/reports/per-record'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::perRecord'
    _title: 'Per-Record P&L'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.report.tax_summary:
  path: '/financial/reports/tax-summary'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialReportController::taxSummary'
    _title: 'Tax Summary'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.export.cpa_csv:
  path: '/financial/export/cpa-csv'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialExportController::cpaCsv'
    _title: 'Export CPA CSV'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.export.quickbooks_csv:
  path: '/financial/export/quickbooks-csv'
  defaults:
    _controller: '\Drupal\farm_financial_mgmt\Controller\FinancialExportController::quickbooksCsv'
    _title: 'Export QuickBooks CSV'
  requirements:
    _permission: 'view financial reports'

farm_financial_mgmt.settings:
  path: '/financial/settings'
  defaults:
    _form: 'Drupal\farm_financial_mgmt\Form\SettingsForm'
    _title: 'Financial settings'
  requirements:
    _permission: 'administer financial mgmt'
